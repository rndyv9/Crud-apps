<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts CRUD</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: #2d3748;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 28px 32px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .header p {
            margin: 4px 0 0;
            opacity: 0.85;
            font-size: 14px;
        }

        .form-section {
            padding: 28px 32px;
            border-bottom: 1px solid #edf2f7;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.05s, background 0.15s, box-shadow 0.15s;
        }

        button:active { transform: translateY(1px); }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }
        .btn-primary:hover { background: #4338ca; }

        .btn-secondary {
            background: #edf2f7;
            color: #2d3748;
        }
        .btn-secondary:hover { background: #e2e8f0; }

        .btn-danger {
            background: transparent;
            color: #e53e3e;
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid #fed7d7;
        }
        .btn-danger:hover { background: #fff5f5; }

        .table-section {
            padding: 24px 32px 32px;
        }

        .table-section h3 {
            margin: 0 0 16px;
            font-size: 16px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .count-badge {
            background: #edf2f7;
            color: #4a5568;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            text-align: left;
            padding: 10px 12px;
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0;
        }

        tbody td {
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
        }

        tbody tr:hover { background: #f9fafb; }

        .empty {
            text-align: center;
            padding: 32px;
            color: #a0aec0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Contact Manager</h1>
        <p>Create, update, and export your contacts</p>
    </div>

    <div class="form-section">
        <div class="form-row">
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="e.g. Jane Doe">
            </div>
            <div>
                <label for="phone">Phone</label>
                <input type="text" id="phone" placeholder="e.g. 0812-3456-7890">
            </div>
        </div>
        <div class="actions">
            <button class="btn-primary" onclick="addOrUpdate()">Add / Update</button>
            <button class="btn-secondary" onclick="downloadCSV()">Download CSV</button>
        </div>
    </div>

    <div class="table-section">
        <h3>Contact List <span class="count-badge" id="count">0</span></h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th style="width: 100px;">Action</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
const API = "";

async function addOrUpdate() {
    const nameInput = document.getElementById("name");
    const phoneInput = document.getElementById("phone");

    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim();

    if (!name || !phone) {
        alert("Name and phone are required");
        return;
    }

    await fetch(`${API}/contact?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`, {
        method: "POST"
    });

    nameInput.value = "";
    phoneInput.value = "";

    loadData();
}

async function deleteContact(name) {
    if (!confirm(`Delete contact "${name}"?`)) return;
    await fetch(`${API}/contact/${encodeURIComponent(name)}`, {
        method: "DELETE"
    });
    loadData();
}

async function loadData() {
    const res = await fetch(`${API}/contacts`);
    const data = await res.json();

    const table = document.getElementById("table-body");
    const count = document.getElementById("count");
    count.textContent = data.length;
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="3" class="empty">No contacts yet. Add your first one above.</td></tr>`;
        return;
    }

    data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${escapeHtml(item.name)}</td>
            <td>${escapeHtml(item.phone_number)}</td>
            <td><button class="btn-danger" data-name="${escapeHtml(item.name)}">Delete</button></td>
        `;
        tr.querySelector("button").addEventListener("click", (e) => {
            deleteContact(e.target.dataset.name);
        });
        table.appendChild(tr);
    });
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function downloadCSV() {
    window.open(`${API}/export/csv`, "_blank");
}

loadData();
</script>

</body>
</html>
